<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      /* Changed from 'cover' to 'contain' to prevent video cropping */
      object-fit: contain;
      display: block;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #selectionMenu {
      display: none;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    button {
      padding: 12px 28px;
      font-size: 18px;
      color: #fff;
      background-color: #222;
      border: 2px solid #555;
      border-radius: 6px;
      cursor: pointer;
      margin: 0 10px;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

  <div id="startOverlay" class="overlay">
    <h1>Click to Launch</h1>
    <button onclick="startLauncher()">Start</button>
  </div>

  <div id="selectionMenu" class="overlay">
    <h1>Select Version</h1>
    <div>
      <button onclick="selectVersion('Starter%20Menu.mp4')">Short</button>
      <button onclick="selectVersion('Full%20Menu.mp4')">Full</button>
    </div>
  </div>

  <video id="myVideo" muted playsinline preload="auto">
    <source id="videoSource" src="Launcher.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    const video = document.getElementById('myVideo');
    const startOverlay = document.getElementById('startOverlay');
    const selectionMenu = document.getElementById('selectionMenu');

    function startLauncher() {
      startOverlay.style.display = 'none';
      video.play().catch(function(error) {
        console.error("Playback error:", error);
      });
    }

    // Triggers when Launcher.mp4 finishes
    video.addEventListener('ended', function() {
      if (!video.loop) {
        selectionMenu.style.display = 'flex';
      }
    });

    // Switches video when user selects Short/Full
    function selectVersion(menuFile) {
      selectionMenu.style.display = 'none';
      
      video.src = menuFile;
      video.loop = true;
      video.muted = false; // Unmutes once user selects an option
      video.load();
      video.play().catch(function(err) {
        console.error("Error playing menu video:", err);
      });
    }
  </script>

</body>
</html>
