<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subway Launcher</title>
  
  <link rel="icon" type="image/png" href="IMG_7114.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <video id="myVideo" autoplay muted playsinline preload="auto">
    <source src="Launcher.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById('myVideo');

    // Prevent right-click menu
    document.addEventListener('contextmenu', e => e.preventDefault(), false);

    // Prevent unwanted keyboard shortcuts
    document.addEventListener('keydown', e => {
      if ([32, 37, 38, 39, 40, 70, 75].includes(e.keyCode)) e.preventDefault();
    });

    // Auto-play Launcher.mp4 with sound on load (or fallback if blocked)
    window.addEventListener('DOMContentLoaded', () => {
      video.muted = false; // Attempt to unmute immediately
      
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Fallback: If browser blocks audio on load, start muted
          video.muted = true;
          video.play();
        });
      }
    });

    // When Launcher.mp4 finishes, loop Full Menu.mp4
    video.addEventListener('ended', function() {
      video.src = 'Full Menu.mp4';
      video.loop = true;
      video.muted = false;
      video.load();
      video.play().catch(err => console.error("Menu play error:", err));
    });
  </script>

</body>
</html>
