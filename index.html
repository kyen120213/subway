<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Video styling */
    #myVideo {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Vista-compatible absolute centering for the menu */
    #selectionMenu {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 150px;
      margin-top: -75px;  /* Half of height */
      margin-left: -160px; /* Half of width */
      text-align: center;
      z-index: 10;
      display: none; /* Hidden at start while Launch.mp4 plays */
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .btn-container {
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      color: #fff;
      background-color: #333;
      border: 2px solid #555;
      cursor: pointer;
      margin: 0 5px;
      display: inline-block;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <video id="myVideo" autoplay muted playsinline>
    <source id="videoSource" src="Launch.mp4.MOV" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div id="selectionMenu">
    <h1>Select Version</h1>
    <div class="btn-container">
      <button onclick="selectVersion('Starter Menu.mp4')">Short</button>
      <button onclick="selectVersion('Full Menu.mp4')">Full</button>
    </div>
  </div>

  <script>
    var video = document.getElementById('myVideo');
    var source = document.getElementById('videoSource');
    var selectionMenu = document.getElementById('selectionMenu');

    // Listener for when Launch.mp4 finishes playing
    if (video.addEventListener) {
      video.addEventListener('ended', onLaunchEnd, false);
    } else if (video.attachEvent) {
      video.attachEvent('onended', onLaunchEnd);
    }

    // Called when Launch.mp4 finishes
    function onLaunchEnd() {
      // Reveal the selection menu over the video
      selectionMenu.style.display = 'block';
    }

    // Called when user clicks "Short" or "Full"
    function selectVersion(menuFile) {
      // Hide the menu screen
      selectionMenu.style.display = 'none';

      // Load the chosen menu video
      source.src = menuFile;
      video.loop = true;
      video.muted = false; // Unmute if you want sound for the main menu
      video.load();
      video.play();
    }
  </script>

</body>
</html>
