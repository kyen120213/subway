<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Launcher</title>
  <style>
    /* Styles to make the video fill the entire screen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Change to 'contain' if you don't want the video cropped */
    }
  </style>
</head>
<body>

  <video id="myVideo" autoplay muted playsinline>
    <source id="videoSource" src="Launch.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    const video = document.getElementById('myVideo');
    const source = document.getElementById('videoSource');

    // Event listener for when Launch.mp4 finishes playing
    video.addEventListener('ended', function() {
      // Change the source to Menu.mp4
      source.src = 'Menu.mp4';
      
      // Enable looping for the new video
      video.loop = true;
      
      // Reload the video player with the new source and start playing
      video.load();
      video.play();
    });
  </script>

</body>
</html>
