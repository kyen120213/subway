<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Video styling */
    #myVideo {
      width: 100%;
      height: 100%;
      display: none; /* Hidden until menu option is chosen */
    }

    /* Vista-compatible absolute centering for the menu */
    #selectionMenu {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 150px;
      margin-top: -75px;  /* Half of height */
      margin-left: -160px; /* Half of width */
      text-align: center;
      z-index: 10;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .btn-container {
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      color: #fff;
      background-color: #333;
      border: 2px solid #555;
      cursor: pointer;
      margin: 0 5px;
      display: inline-block;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <div id="selectionMenu">
    <h1>Select Version</h1>
    <div class="btn-container">
      <button onclick="selectVersion('Starter Menu.mp4')">Short</button>
      <button onclick="selectVersion('Full Menu.mp4')">Full</button>
    </div>
  </div>

  <video id="myVideo">
    <source id="videoSource" src="Launch.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    // Using 'var' instead of 'const/let' for legacy JS engines (IE9/Vista)
    var video = document.getElementById('myVideo');
    var source = document.getElementById('videoSource');
    var selectionMenu = document.getElementById('selectionMenu');
    var targetMenuVideo = '';

    function selectVersion(menuFile) {
      targetMenuVideo = menuFile;

      // Hide menu and display video container
      selectionMenu.style.display = 'none';
      video.style.display = 'block';

      // Play Launch.mp4
      video.play();
    }

    // Listener for when Launch.mp4 ends
    if (video.addEventListener) {
      video.addEventListener('ended', onVideoEnd, false);
    } else if (video.attachEvent) {
      video.attachEvent('onended', onVideoEnd);
    }

    function onVideoEnd() {
      source.src = targetMenuVideo;
      video.loop = true;
      video.load();
      video.play();
    }
  </script>

</body>
</html>
